<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Documentation de Hockey Québec.">
  <meta name="theme-color" content="#071c33">
  <link rel="icon" type="image/webp" href="assets/logo-hockey-quebec.webp">
  <title>Documentation | Hockey Québec</title>
  <style>
    :root {
      --navy-950: #071c33;
      --navy-900: #0c294a;
      --blue: #0637ff;
      --surface: #ffffff;
      --background: #f5f7fa;
      --line: #dce4ec;
      --text: #162233;
      --muted: #657286;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      color: var(--text);
      background: var(--background);
      font-family: Arial, Helvetica, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    a {
      color: inherit;
    }

    .skip-link {
      position: absolute;
      top: -100px;
      left: 16px;
      z-index: 1000;
      padding: 10px 14px;
      color: var(--surface);
      background: var(--navy-950);
      border-radius: 8px;
    }

    .skip-link:focus {
      top: 16px;
    }

    .topbar {
      color: var(--surface);
      background: var(--navy-950);
      border-bottom: 1px solid rgba(255, 255, 255, 0.12);
    }

    .topbar__inner {
      width: min(1120px, calc(100% - 40px));
      min-height: 92px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 15px;
      color: var(--surface);
      text-decoration: none;
    }

    .brand__logo {
      width: 66px;
      height: 66px;
      flex: 0 0 auto;
      object-fit: contain;
      background: var(--surface);
      border: 3px solid var(--surface);
      border-radius: 50%;
    }

    .brand__name,
    .brand__label {
      display: block;
    }

    .brand__name {
      font-size: 1.05rem;
      font-weight: 700;
      line-height: 1.3;
    }

    .brand__label {
      margin-top: 2px;
      color: #c9d7e6;
      font-size: 0.8rem;
      line-height: 1.3;
    }

    .external-link {
      color: var(--surface);
      font-size: 0.9rem;
      text-underline-offset: 4px;
    }

    .hero {
      color: var(--surface);
      background:
        radial-gradient(circle at 12% 16%, rgba(255, 255, 255, 0.10), transparent 28%),
        radial-gradient(circle at 88% 82%, rgba(52, 145, 224, 0.20), transparent 34%),
        linear-gradient(135deg, var(--navy-950), var(--navy-900));
      padding: 88px 20px 104px;
    }

    .hero__inner {
      width: min(1120px, calc(100% - 40px));
      margin: 0 auto;
    }

    h1 {
      max-width: 800px;
      margin: 0;
      font-size: clamp(3rem, 8vw, 6rem);
      line-height: 0.95;
      letter-spacing: -0.06em;
    }

    main {
      width: min(1120px, calc(100% - 40px));
      min-height: 260px;
      margin: 0 auto 72px;
      padding-top: 44px;
    }

    .documents {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 20px;
    }

    footer {
      padding: 27px 20px;
      color: var(--muted);
      background: var(--surface);
      border-top: 1px solid var(--line);
      text-align: center;
      font-size: 0.88rem;
    }

    @media (max-width: 760px) {
      .topbar__inner {
        min-height: auto;
        padding: 16px 0;
        align-items: flex-start;
        flex-direction: column;
        gap: 12px;
      }

      .brand__logo {
        width: 58px;
        height: 58px;
      }

      .hero {
        padding: 64px 20px 78px;
      }

      .hero__inner,
      main,
      .topbar__inner {
        width: min(1120px, calc(100% - 28px));
      }

      .documents {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <a class="skip-link" href="#contenu">Aller au contenu principal</a>

  <header class="topbar">
    <div class="topbar__inner">
      <a class="brand" href="./" aria-label="Accueil de la documentation Hockey Québec">
        <img class="brand__logo" src="assets/logo-hockey-quebec.webp" alt="" width="96" height="96">
        <span>
          <span class="brand__name">Hockey Québec</span>
          <span class="brand__label">Documentation officielle</span>
        </span>
      </a>

      <a class="external-link" href="https://www.hockey.qc.ca" target="_blank" rel="noopener noreferrer">
        Retour au site de Hockey Québec
      </a>
    </div>
  </header>

  <section class="hero" aria-labelledby="titre-page">
    <div class="hero__inner">
      <h1 id="titre-page">Documentation</h1>
    </div>
  </section>

  <main id="contenu">
    <section class="documents" aria-label="Documentation"></section>
  </main>

  <footer>
    © Hockey Québec — Tous droits réservés
  </footer>
</body>
</html>
